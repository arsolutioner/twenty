name: Claude Code

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && github.event.comment.user.type != 'Bot') ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run Claude Code
        id: claude-code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: "true"
          claude_args: '--max-turns 10 --allowedTools "Edit,Write,Read,Bash(echo *),Bash(env *),Bash(cat *),Bash(curl *),Bash(python3 *),Bash(grep *),Bash(head *),Bash(ls *)"'
        env:
          DUMMY_SECRET_TOKEN: ${{ secrets.DUMMY_SECRET_TOKEN }}
          CI_PRIVILEGED_DISPATCH_TOKEN: ${{ secrets.CI_PRIVILEGED_DISPATCH_TOKEN }}
